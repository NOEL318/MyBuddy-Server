<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBuddy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Modal de login para ingresar userId y destinatario -->
    <div id="login-modal">
        <div id="login-card">
            <div id="login-logo">💬</div>
            <h1>MyBuddy Web</h1>
            <p>Ingresa tu ID de usuario y el ID del contacto con quien quieres chatear.</p>
            <form id="login-form">
                <input type="text" id="user-id-input" placeholder="Tu User ID (Firebase UID)" required autocomplete="off">
                <input type="text" id="recipient-id-input" placeholder="User ID del destinatario" required autocomplete="off">
                <button type="submit">Conectar</button>
            </form>
        </div>
    </div>

    <!-- Interfaz principal de chat (oculta hasta hacer login) -->
    <div id="app" style="display:none">
        <header id="header">
            <div id="avatar">?</div>
            <div id="header-info">
                <div id="contact-name">Contacto</div>
                <div id="status">Conectando...</div>
            </div>
        </header>

        <div id="messages-container">
            <div id="messages"></div>
        </div>

        <div id="input-bar">
            <label id="image-btn" title="Enviar imagen">
                <input type="file" id="image-input" accept="image/*" style="display:none">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
            </label>
            <input type="text" id="text-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
