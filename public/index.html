<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBuddy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="auth-screen" class="screen active">

        <div id="login-panel" class="auth-panel active">
            <div class="auth-scroll">
                <div class="logo-section">
                    <div class="logo-circle large">
                        <svg viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 2C.9 2 0 2.9 0 4v10c0 1.1.9 2 2 2h2v4l4-4h8c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2H2z" fill="white" opacity="0.85"/>
                            <path d="M12 9c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2h-2v3l-3-3h-5c-1.1 0-2-.9-2-2V9z" fill="white"/>
                        </svg>
                    </div>
                    <h1 class="app-title">MyBuddy</h1>
                </div>

                <div class="auth-card">
                    <div class="input-row">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                        <input type="email" id="login-email" placeholder="Correo electrónico" autocomplete="email" autocapitalize="none">
                    </div>
                    <div class="input-row">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/></svg>
                        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password">
                    </div>

                    <div id="login-error" class="error-msg"></div>

                    <button id="login-btn" class="primary-btn">
                        <span id="login-btn-text">Iniciar sesión</span>
                        <div id="login-spinner" class="spinner hidden"></div>
                    </button>

                    <button class="link-btn" id="goto-register-btn">
                        ¿No tienes cuenta? <span>Regístrate</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="register-panel" class="auth-panel">
            <div class="auth-scroll">
                <div class="logo-section compact">
                    <div class="logo-circle medium">
                        <svg viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 2C.9 2 0 2.9 0 4v10c0 1.1.9 2 2 2h2v4l4-4h8c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2H2z" fill="white" opacity="0.85"/>
                            <path d="M12 9c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2h-2v3l-3-3h-5c-1.1 0-2-.9-2-2V9z" fill="white"/>
                        </svg>
                    </div>
                    <h1 class="app-title">Crear cuenta</h1>
                </div>

                <div class="auth-card">
                    <div class="input-row" id="reg-username-row">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
                        <input type="text" id="reg-username" placeholder="Nombre de usuario (mín. 3 caracteres)" autocapitalize="none" autocorrect="off" spellcheck="false">
                    </div>
                    <p class="field-error hidden" id="err-username"></p>

                    <div class="input-row">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                        <input type="email" id="reg-email" placeholder="Correo electrónico" autocomplete="email" autocapitalize="none">
                    </div>
                    <p class="field-error hidden" id="err-email"></p>

                    <div class="input-row">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/></svg>
                        <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password">
                    </div>
                    <p class="field-error hidden" id="err-password"></p>

                    <div class="input-row">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z" fill="currentColor"/></svg>
                        <input type="password" id="reg-confirm" placeholder="Confirmar contraseña" autocomplete="new-password">
                    </div>
                    <p class="field-error hidden" id="err-confirm"></p>

                    <div id="register-error" class="error-msg"></div>

                    <button id="register-btn" class="primary-btn">
                        <span id="register-btn-text">Registrarse</span>
                        <div id="register-spinner" class="spinner hidden"></div>
                    </button>

                    <button class="link-btn" id="goto-login-btn">
                        ¿Ya tienes cuenta? <span>Inicia sesión</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="directory-screen" class="screen">
        <div id="dir-header">
            <div class="dir-header-left">
                <div class="logo-circle small">
                    <svg viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 2C.9 2 0 2.9 0 4v10c0 1.1.9 2 2 2h2v4l4-4h8c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2H2z" fill="white" opacity="0.85"/>
                        <path d="M12 9c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2h-2v3l-3-3h-5c-1.1 0-2-.9-2-2V9z" fill="white"/>
                    </svg>
                </div>
                <div>
                    <div class="dir-app-name">MyBuddy</div>
                    <div id="my-username" class="dir-username"></div>
                </div>
            </div>
            <button id="logout-btn" title="Cerrar sesión">
                <svg viewBox="0 0 24 24" width="22" height="22"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/></svg>
            </button>
        </div>

        <div id="search-bar">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#8696a0"/></svg>
            <input type="search" id="search-input" placeholder="Buscar usuarios...">
        </div>

        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-header">
            <button id="back-btn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
            </button>
            <div id="chat-avatar">?</div>
            <div id="chat-header-info">
                <div id="contact-name">Contacto</div>
                <div id="status">Conectando...</div>
            </div>
        </div>

        <div id="messages-container">
            <div id="messages"></div>
        </div>

        <div id="input-bar">
            <label id="image-btn" title="Enviar imagen">
                <input type="file" id="image-input" accept="image/*" style="display:none">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
            </label>
            <input type="text" id="text-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="lightbox"><img id="lightbox-img" alt=""></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
